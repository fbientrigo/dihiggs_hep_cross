data_file: diphoton_selection_cutflow.yaml
description: Effect of event selections on a NWA spin-0 and a spin-2 ($k/Mpl=0.01$)
  MC samples generated for m_X = 1 TeV and on the data. For the MC samples, the event
  yield is shown after applying event weights; for the data, the absolute yields are
  shown.  The initial yields for data include a trigger preselection that is the OR
  of a list of single photon and diphoton triggers. The "2 $loose$ photons" step includes
  the kinematic acceptance cuts. The cross-section times branching ratio for the spin-0
  sample is normalized to the MadGraph NLO prediction of 112~fb and the cross-section
  times branching ratio for the graviton corresponds to the Pythia8 prediction of
  12~fb.
keywords:
- name: reactions
  values: [P P --> gamma gamma]
- name: observables
  values: [Event Count]
- name: cmenergies
  values: [13000.0]
- name: phrases
  values: [Selections, Cutflow, Diphoton resonance]
location: Table 01 (auxiliary material)
name: Table 12
table_doi: 10.17182/hepdata.100161.v2/t12
