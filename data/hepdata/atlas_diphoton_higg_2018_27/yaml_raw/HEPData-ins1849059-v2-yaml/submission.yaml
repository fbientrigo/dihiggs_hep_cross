data_file: Limit1D_NW_Scalar.yaml
description: "The expected and observed upper limits at 95\\% CL on the fiducial cross-section
  times branching ratio to two photons of a narrow-width (\u0393_X = 4 MeV) spin-0
  resonance as a function of its mass m_X. For masses greater than 1000 GeV, pseudo-experiments
  are used to verify the expected and observed limits, and used in place of the asymptotic
  limit when differences are observed."
